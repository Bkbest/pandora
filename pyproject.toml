[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pandora-sandbox"
version = "0.1.0"
description = "Docker-backed sandbox manager for running code generated by AI agents"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "docker>=7.1.0",
    "pydantic",
    "mcp>=1.2.0",
    "starlette",
]

[project.scripts]
pandora-sandbox = "app.mcp_server:main"

[tool.setuptools.packages.find]
where = ["app"]
include = ["service*"]
